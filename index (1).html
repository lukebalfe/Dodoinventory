<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

  :root {
    --bg: #1c1815;
    --surface: #262019;
    --surface-raised: #302921;
    --border: #3d342a;
    --text: #f0ece2;
    --text-dim: #a89d8c;
    --text-faint: #746a5c;
    --accent: #e0a458;
    --accent-dim: #8a6a3d;
    --stock-good: #7cb88f;
    --stock-good-bg: #223229;
    --stock-low: #e0a458;
    --stock-low-bg: #332a1a;
    --stock-out: #d97a6c;
    --stock-out-bg: #332420;
    --radius: 6px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
  }

  a { color: inherit; }

  /* ---------- Header ---------- */

  header {
    padding: 32px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .brand .tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 999px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .header-stats b {
    color: var(--text);
    font-family: var(--font-display);
    font-size: 15px;
    display: block;
  }

  /* ---------- Controls ---------- */

  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .controls input[type="text"],
  .controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
  }

  .controls input[type="text"] {
    flex: 1;
    min-width: 200px;
  }

  .controls input[type="text"]:focus,
  .controls select:focus {
    border-color: var(--accent-dim);
  }

  .controls input::placeholder { color: var(--text-faint); }

  /* ---------- Grid ---------- */

  main {
    padding: 24px 32px 64px;
  }

  #status-line {
    color: var(--text-faint);
    font-size: 12px;
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .card-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    line-height: 1.3;
  }

  .card-code {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  .badge-cat {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
  }

  select.variant-select {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 9px;
    border-radius: 4px;
    outline: none;
    width: 100%;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .price {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
  }

  .sku {
    font-size: 10px;
    color: var(--text-faint);
  }

  /* Stamp-style status badge */
  .stamp {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 9px;
    border-radius: 3px;
    border: 1.5px solid currentColor;
    transform: rotate(-2deg);
    display: inline-block;
  }

  .stamp.good { color: var(--stock-good); background: var(--stock-good-bg); }
  .stamp.low  { color: var(--stock-low);  background: var(--stock-low-bg); }
  .stamp.out  { color: var(--stock-out);  background: var(--stock-out-bg); }

  .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-faint);
  }

  .error-state { color: var(--stock-out); }

  .empty-state h2, .error-state h2 {
    font-family: var(--font-display);
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 6px;
  }

  /* ---------- Login ---------- */

  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .login-box h1 {
    font-family: var(--font-display);
    font-size: 20px;
    margin: 0 0 2px;
    text-align: center;
  }

  .login-sub {
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    margin: 0 0 12px;
  }

  .login-box input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
  }

  .login-box input:focus { border-color: var(--accent-dim); }

  .login-box button {
    background: var(--accent);
    color: #1c1815;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    padding: 11px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 4px;
  }

  .login-box button:hover { opacity: 0.9; }

  .login-error {
    color: var(--stock-out);
    font-size: 12px;
    text-align: center;
    min-height: 16px;
  }

  .signout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
  }

  .signout-btn:hover { color: var(--text); border-color: var(--text-faint); }

  .add-btn {
    background: var(--accent);
    color: #1c1815;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.9; }

  .edit-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-faint);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
  }

  .edit-btn:hover { color: var(--text); border-color: var(--text-faint); }

  /* ---------- Modal ---------- */

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    z-index: 100;
  }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
  }

  .modal-box h2 {
    font-family: var(--font-display);
    font-size: 17px;
    margin: 0 0 16px;
  }

  .modal-box label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    margin: 12px 0 5px;
  }

  .modal-box input, .modal-box textarea {
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: var(--radius);
    outline: none;
    resize: vertical;
  }

  .modal-box input:focus, .modal-box textarea:focus { border-color: var(--accent-dim); }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-primary {
    background: var(--accent);
    color: #1c1815;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: var(--radius);
    cursor: pointer;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 9px 16px;
    border-radius: var(--radius);
    cursor: pointer;
  }

</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <h1>Dodo Coffee Inventory</h1>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="login-error"></div>
  </form>
</div>

<div id="app" style="display: none;">

<header>
  <div class="brand">
    <h1>Dodo Coffee Inventory</h1>
    <span class="tag">Live Stock</span>
  </div>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div class="header-stats" id="header-stats"></div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search products, SKU...">
  <select id="category-filter">
    <option value="">All categories</option>
  </select>
  <select id="stock-filter">
    <option value="">All stock levels</option>
    <option value="good">In stock</option>
    <option value="low">Low stock</option>
    <option value="out">Out of stock</option>
  </select>
  <button id="add-product-btn" class="add-btn" style="display:none;" onclick="openAddModal()">+ Add product</button>
</div>

<main>

  <div id="status-line">Loading inventory…</div>
  <div class="grid" id="grid"></div>
</main>

<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2 id="modal-title">Add product</h2>
    <form id="item-form">
      <input type="hidden" id="f-mode" value="add">
      <input type="hidden" id="f-product-id" value="">
      <input type="hidden" id="f-item-id" value="">

      <label>Product name</label>
      <input type="text" id="f-name" required placeholder="e.g. Hot Cup">

      <label>Category</label>
      <input type="text" id="f-category" list="category-options" placeholder="e.g. Cups, Lids, Straws">
      <datalist id="category-options"></datalist>

      <label>Vendor / Manufacturer</label>
      <input type="text" id="f-vendor" list="vendor-options" placeholder="e.g. Yamipak">
      <datalist id="vendor-options"></datalist>

      <label>Description</label>
      <textarea id="f-description" rows="2"></textarea>

      <div class="field-row">
        <div>
          <label>Variant (size/flavor, if any)</label>
          <input type="text" id="f-variant" placeholder="e.g. 12oz">
        </div>
        <div>
          <label>SKU</label>
          <input type="text" id="f-sku">
        </div>
      </div>

      <div class="field-row">
        <div>
          <label>Purchase price</label>
          <input type="number" step="0.01" id="f-purchase-price">
        </div>
        <div>
          <label>Selling price</label>
          <input type="number" step="0.01" id="f-selling-price">
        </div>
      </div>

      <div class="field-row">
        <div>
          <label>Stock on hand</label>
          <input type="number" id="f-stock">
        </div>
        <div>
          <label>Reorder level</label>
          <input type="number" id="f-reorder">
        </div>
      </div>

      <label>Location</label>
      <input type="text" id="f-location">

      <div id="modal-error" class="login-error"></div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

</div><!-- #app -->

<script>
  // ---- Connect to Supabase ----
  const SUPABASE_URL = 'https://kzoiuhaiqscaqiezzqmu.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6b2l1aGFpcXNjYXFpZXp6cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjcyMzUsImV4cCI6MjA5ODUwMzIzNX0.IcI9jcedtmCOU_5YNnmACRzZm00IHPqhCiV_GzIOBg8';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allProducts = [];
  let isAdmin = false;
  const mainEl = document.querySelector('main');

  function stockStatus(item) {
    const stock = Number(item.stock_on_hand ?? 0);
    const reorder = Number(item.reorder_level ?? 0);
    if (stock <= 0) return 'out';
    if (reorder > 0 && stock <= reorder) return 'low';
    return 'good';
  }

  function stockLabel(status) {
    return { good: 'In stock', low: 'Low stock', out: 'Out of stock' }[status];
  }

  function money(v) {
    if (v === null || v === undefined) return '—';
    return '$' + Number(v).toFixed(2);
  }

  function variantLabel(item) {
    const parts = [];
    if (item.attribute1_value) parts.push(item.attribute1_value);
    if (item.attribute2_value) parts.push(item.attribute2_value);
    if (item.attribute3_value) parts.push(item.attribute3_value);
    return parts.length ? parts.join(' / ') : item.variant_name;
  }

  function renderCard(product) {
    const items = product.items || [];
    if (items.length === 0) return '';

    const selectId = `variant-${product.id}`;
    const options = items.map((it, i) =>
      `<option value="${i}">${variantLabel(it)}</option>`
    ).join('');

    const cat = product.categories?.name || 'Uncategorized';

    return `
      <div class="card" data-product-id="${product.id}">
        <div class="card-top">
          <div>
            <div class="card-title">${product.name}</div>
            <div class="card-code">${product.product_code || ''}</div>
          </div>
          <span class="badge-cat">${cat}</span>
        </div>

        ${items.length > 1
          ? `<select class="variant-select" id="${selectId}" onchange="updateCard('${product.id}')">${options}</select>`
          : `<div class="card-meta"><span>${variantLabel(items[0])}</span></div>`
        }

        <div class="card-bottom" id="card-bottom-${product.id}"></div>
        ${isAdmin ? `<button class="edit-btn" onclick="openEditModal('${product.id}')">Edit</button>` : ''}
      </div>
    `;
  }

  function renderCardBottom(product, item) {
    const status = stockStatus(item);
    return `
      <div>
        <div class="price">${money(item.selling_price)}</div>
        <div class="sku">${item.sku || item.item_code || ''}</div>
      </div>
      <span class="stamp ${status}">${stockLabel(status)}</span>
    `;
  }

  window.updateCard = function(productId) {
    const product = allProducts.find(p => p.id === productId);
    const select = document.getElementById(`variant-${productId}`);
    const index = select ? Number(select.value) : 0;
    const item = product.items[index];
    document.getElementById(`card-bottom-${productId}`).innerHTML = renderCardBottom(product, item);
  };

  function applyFiltersAndRender() {
    const search = document.getElementById('search').value.trim().toLowerCase();
    const categoryFilter = document.getElementById('category-filter').value;
    const stockFilter = document.getElementById('stock-filter').value;

    const filtered = allProducts.filter(product => {
      if (categoryFilter && product.categories?.name !== categoryFilter) return false;

      if (search) {
        const haystack = (product.name + ' ' +
          (product.items || []).map(i => (i.sku || '') + ' ' + (i.variant_name || '')).join(' ')
        ).toLowerCase();
        if (!haystack.includes(search)) return false;
      }

      if (stockFilter) {
        const anyMatch = (product.items || []).some(i => stockStatus(i) === stockFilter);
        if (!anyMatch) return false;
      }

      return (product.items || []).length > 0;
    });

    const grid = document.getElementById('grid');
    const statusLine = document.getElementById('status-line');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      statusLine.innerHTML = '';
      grid.parentElement.querySelector('.empty-state')?.remove();
      mainEl.insertAdjacentHTML('beforeend', `
        <div class="empty-state">
          <h2>No matches</h2>
          <div>Try a different search or filter.</div>
        </div>
      `);
      return;
    }

    document.querySelector('.empty-state')?.remove();
    statusLine.textContent = `Showing ${filtered.length} of ${allProducts.length} products`;
    grid.innerHTML = filtered.map(renderCard).join('');

    filtered.forEach(product => {
      document.getElementById(`card-bottom-${product.id}`).innerHTML =
        renderCardBottom(product, product.items[0]);
    });
  }

  function populateCategoryFilter(products) {
    const cats = [...new Set(products.map(p => p.categories?.name).filter(Boolean))].sort();
    const select = document.getElementById('category-filter');
    cats.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      select.appendChild(opt);
    });
  }

  function renderHeaderStats(products) {
    const totalItems = products.reduce((sum, p) => sum + (p.items || []).length, 0);
    const lowOrOut = products.reduce((sum, p) =>
      sum + (p.items || []).filter(i => stockStatus(i) !== 'good').length, 0);

    document.getElementById('header-stats').innerHTML = `
      <div><b>${products.length}</b>products</div>
      <div><b>${totalItems}</b>variants tracked</div>
      <div><b>${lowOrOut}</b>need attention</div>
    `;
  }

  async function loadInventory() {
    let data, error;
    try {
      ({ data, error } = await supabaseClient
        .from('products')
        .select(`
          id, name, product_code, description,
          categories ( name ),
          vendors ( name ),
          items ( id, item_code, variant_name, sku, unit, purchase_price, selling_price, stock_on_hand, reorder_level, status, location_name,
                  attribute1_value, attribute2_value, attribute3_value )
        `)
        .order('name'));
    } catch (err) {
      error = { message: `Network/connection error: ${err.message}. If you're opening this file directly (file://), try running a local server instead — see the comment at the top of this script.` };
    }

    if (error) {
      document.getElementById('status-line').textContent = '';
      document.getElementById('grid').innerHTML = '';
      mainEl.insertAdjacentHTML('beforeend', `
        <div class="error-state">
          <h2>Couldn't load inventory</h2>
          <div>${error.message}</div>
        </div>
      `);
      return;
    }

    allProducts = data;
    populateCategoryFilter(data);
    renderHeaderStats(data);
    applyFiltersAndRender();
  }

  document.getElementById('search').addEventListener('input', applyFiltersAndRender);
  document.getElementById('category-filter').addEventListener('change', applyFiltersAndRender);
  document.getElementById('stock-filter').addEventListener('change', applyFiltersAndRender);

  // ---- Auth ----
  const loginScreen = document.getElementById('login-screen');
  const appEl = document.getElementById('app');

  async function checkAdmin() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { isAdmin = false; return; }
    const { data } = await supabaseClient
      .from('admins')
      .select('user_id')
      .eq('user_id', user.id)
      .maybeSingle();
    isAdmin = !!data;
    document.getElementById('add-product-btn').style.display = isAdmin ? '' : 'none';
  }

  function showApp() {
    loginScreen.style.display = 'none';
    appEl.style.display = '';
    checkAdmin().then(loadInventory);
  }

  function showLogin() {
    loginScreen.style.display = 'flex';
    appEl.style.display = 'none';
  }

  // ---- Add/Edit product modal ----
  const modalOverlay = document.getElementById('modal-overlay');
  const itemForm = document.getElementById('item-form');

  function slugify(s) {
    return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  function populateDatalists() {
    const cats = [...new Set(allProducts.map(p => p.categories?.name).filter(Boolean))];
    const vends = [...new Set(allProducts.map(p => p.vendors?.name).filter(Boolean))];
    document.getElementById('category-options').innerHTML = cats.map(c => `<option value="${c}">`).join('');
    document.getElementById('vendor-options').innerHTML = vends.map(v => `<option value="${v}">`).join('');
  }

  window.openAddModal = function() {
    itemForm.reset();
    document.getElementById('f-mode').value = 'add';
    document.getElementById('f-product-id').value = '';
    document.getElementById('f-item-id').value = '';
    document.getElementById('modal-title').textContent = 'Add product';
    document.getElementById('modal-error').textContent = '';
    populateDatalists();
    modalOverlay.style.display = 'flex';
  };

  window.openEditModal = function(productId) {
    const product = allProducts.find(p => p.id === productId);
    const select = document.getElementById(`variant-${productId}`);
    const index = select ? Number(select.value) : 0;
    const item = product.items[index];

    itemForm.reset();
    document.getElementById('f-mode').value = 'edit';
    document.getElementById('f-product-id').value = product.id;
    document.getElementById('f-item-id').value = item.id;
    document.getElementById('modal-title').textContent = 'Edit ' + product.name;
    document.getElementById('modal-error').textContent = '';

    document.getElementById('f-name').value = product.name || '';
    document.getElementById('f-category').value = product.categories?.name || '';
    document.getElementById('f-vendor').value = product.vendors?.name || '';
    document.getElementById('f-description').value = product.description || '';
    document.getElementById('f-variant').value = item.attribute1_value || item.variant_name || '';
    document.getElementById('f-sku').value = item.sku || '';
    document.getElementById('f-purchase-price').value = item.purchase_price ?? '';
    document.getElementById('f-selling-price').value = item.selling_price ?? '';
    document.getElementById('f-stock').value = item.stock_on_hand ?? '';
    document.getElementById('f-reorder').value = item.reorder_level ?? '';
    document.getElementById('f-location').value = item.location_name || '';

    populateDatalists();
    modalOverlay.style.display = 'flex';
  };

  window.closeModal = function() {
    modalOverlay.style.display = 'none';
  };

  async function getOrCreateByName(table, name) {
    if (!name) return null;
    const { data: existing } = await supabaseClient.from(table).select('id').eq('name', name).maybeSingle();
    if (existing) return existing.id;
    const { data: inserted, error } = await supabaseClient.from(table).insert({ name }).select('id').single();
    if (error) throw error;
    return inserted.id;
  }

  itemForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('modal-error');
    errorEl.textContent = '';

    const mode = document.getElementById('f-mode').value;
    const name = document.getElementById('f-name').value.trim();
    const categoryName = document.getElementById('f-category').value.trim();
    const vendorName = document.getElementById('f-vendor').value.trim();
    const description = document.getElementById('f-description').value.trim() || null;
    const variant = document.getElementById('f-variant').value.trim();
    const sku = document.getElementById('f-sku').value.trim() || null;
    const purchasePrice = document.getElementById('f-purchase-price').value;
    const sellingPrice = document.getElementById('f-selling-price').value;
    const stock = document.getElementById('f-stock').value;
    const reorder = document.getElementById('f-reorder').value;
    const location = document.getElementById('f-location').value.trim() || null;

    try {
      const categoryId = await getOrCreateByName('categories', categoryName);
      const vendorId = await getOrCreateByName('vendors', vendorName);

      let productId = document.getElementById('f-product-id').value || null;

      if (mode === 'add') {
        // Reuse an existing product with the same name if there is one,
        // otherwise create a new one.
        const { data: existingProduct } = await supabaseClient
          .from('products').select('id').eq('name', name).maybeSingle();

        if (existingProduct) {
          productId = existingProduct.id;
          await supabaseClient.from('products').update({
            description, category_id: categoryId, vendor_id: vendorId
          }).eq('id', productId);
        } else {
          const { data: newProduct, error: prodErr } = await supabaseClient
            .from('products')
            .insert({ name, description, category_id: categoryId, vendor_id: vendorId, product_code: slugify(name) })
            .select('id').single();
          if (prodErr) throw prodErr;
          productId = newProduct.id;
        }

        const itemPayload = {
          product_id: productId,
          variant_name: variant || name,
          sku,
          purchase_price: purchasePrice === '' ? null : Number(purchasePrice),
          selling_price: sellingPrice === '' ? null : Number(sellingPrice),
          stock_on_hand: stock === '' ? null : Number(stock),
          reorder_level: reorder === '' ? null : Number(reorder),
          location_name: location,
          attribute1_name: variant ? 'Variant' : null,
          attribute1_value: variant || null,
          item_code: sku || (slugify(variant || name) + '-' + Date.now().toString().slice(-5))
        };
        const { error: itemErr } = await supabaseClient.from('items').insert(itemPayload);
        if (itemErr) throw itemErr;

      } else {
        // Edit mode: update the existing product and item
        await supabaseClient.from('products').update({
          name, description, category_id: categoryId, vendor_id: vendorId
        }).eq('id', productId);

        const itemId = document.getElementById('f-item-id').value;
        const { error: itemErr } = await supabaseClient.from('items').update({
          variant_name: variant || name,
          sku,
          purchase_price: purchasePrice === '' ? null : Number(purchasePrice),
          selling_price: sellingPrice === '' ? null : Number(sellingPrice),
          stock_on_hand: stock === '' ? null : Number(stock),
          reorder_level: reorder === '' ? null : Number(reorder),
          location_name: location,
          attribute1_name: variant ? 'Variant' : null,
          attribute1_value: variant || null
        }).eq('id', itemId);
        if (itemErr) throw itemErr;
      }

      closeModal();
      loadInventory();

    } catch (err) {
      errorEl.textContent = err.message || 'Something went wrong saving this.';
    }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    errorEl.textContent = '';

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errorEl.textContent = error.message;
      return;
    }
    showApp();
  });

  document.getElementById('signout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    showLogin();
  });

  // Check if already logged in (e.g. returning visitor)
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) {
      showApp();
    } else {
      showLogin();
    }
  });

</script>

</body>
</html>
