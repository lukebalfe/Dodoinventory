<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory — Vendors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <img src="assets/dodo-full-logo.png" alt="Dodo Coffee Co" class="login-logo">
    <p class="login-sub" style="margin-top:-4px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:11px;">Inventory</p>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<div id="app" style="display:none;">

  <nav class="topnav">
    <div class="nav-brand"><img src="assets/dodo-bird.png" alt="" class="nav-logo"> Dodo Coffee</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="items.html">Items</a>
      <a href="vendors.html">Vendors</a>
      <a href="locations.html">Locations</a>
      <a href="transfer-orders.html">Transfer Orders</a>
      <a href="purchase-orders.html">Purchase Orders</a>
    </div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Vendors</h1>
        <p>Suppliers and contact info</p>
      </div>
    </div>

    <div class="placeholder-state">
      <div class="icon-wrap" style="margin-bottom:10px;"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;stroke:var(--accent);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <h2>Coming soon</h2>
      <div>This page is next on the list — full vendor list and an 'Add vendor' form are coming in our next round of changes.</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
  initAuthGate(function() {});
</script>

</body>
</html>
