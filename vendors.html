<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory — Vendors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Home screen / app-icon support -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dodo Inventory">
<meta name="theme-color" content="#4b3621">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .vendor-card.highlighted { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .vendor-card-actions { display: flex; gap: 8px; margin-top: 10px; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <img src="assets/dodo-full-logo.png" alt="Dodo Coffee Co" class="login-logo">
    <p class="login-sub" style="margin-top:-4px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:11px;">Inventory</p>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<div id="app" style="display:none;">

  <nav class="topnav">
    <div class="nav-brand"><img src="assets/dodo-bird.png" alt="" class="nav-logo"> Dodo Coffee</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="items.html">Items</a>
      <a href="vendors.html">Vendors</a>
      <a href="locations.html">Locations</a>
      <a href="stock-counts.html">Stock Counts</a>
      <a href="stock-adjustments.html">Stock Adjustments</a>
      <a href="transfer-orders.html">Transfer Orders</a>
      <a href="purchase-orders.html">Purchase Orders</a>
    </div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Vendors</h1>
        <p>Suppliers and their contact info</p>
      </div>
      <button class="btn-primary admin-only" style="display:none;" onclick="openAddVendorModal()">+ Add vendor</button>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="Search vendors...">
    </div>

    <div id="status-line" class="status-line">Loading vendors…</div>
    <div class="vendor-grid" id="vendor-grid"></div>
  </div>
</div>

<!-- Add/Edit vendor modal -->
<div id="vendor-modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2 id="vendor-modal-title">Add vendor</h2>
    <form id="vendor-form">
      <input type="hidden" id="v-id" value="">

      <label>Vendor name</label>
      <input type="text" id="v-name" required placeholder="e.g. Yamipak">

      <label>Contact name</label>
      <input type="text" id="v-contact-name" placeholder="e.g. Jane Smith">

      <label>Email</label>
      <input type="email" id="v-email" placeholder="e.g. orders@yamipak.com">

      <label>Phone</label>
      <input type="text" id="v-phone" placeholder="e.g. (555) 123-4567">

      <label>Address</label>
      <input type="text" id="v-address" placeholder="Optional">

      <div id="vendor-form-error" class="form-error"></div>
      <div class="modal-actions">
        <div>
          <button type="button" id="delete-vendor-btn" class="btn-danger" style="display:none;" onclick="deleteCurrentVendor()">Delete vendor</button>
        </div>
        <div class="right-actions">
          <button type="button" class="btn-secondary" onclick="closeVendorModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
<script>
  let allVendorsList = [];

  async function loadVendors() {
    const { data, error } = await supabaseClient
      .from('vendors')
      .select(`id, name, contact_name, email, phone, address, products ( id )`)
      .order('name');

    const statusLine = document.getElementById('status-line');
    const grid = document.getElementById('vendor-grid');

    if (error) {
      statusLine.textContent = '';
      grid.innerHTML = `<div class="error-state"><h2>Couldn't load vendors</h2><div>${error.message}</div></div>`;
      return;
    }

    allVendorsList = data || [];
    render();
  }

  function render() {
    const search = document.getElementById('search').value.trim().toLowerCase();
    const highlightId = new URLSearchParams(location.search).get('vendor');

    let filtered = allVendorsList;
    if (search) {
      filtered = filtered.filter(v =>
        (v.name + ' ' + (v.contact_name || '') + ' ' + (v.email || '')).toLowerCase().includes(search)
      );
    }

    const statusLine = document.getElementById('status-line');
    const grid = document.getElementById('vendor-grid');

    statusLine.textContent = `${filtered.length} vendor${filtered.length === 1 ? '' : 's'}`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h2>No vendors match</h2><div>Try a different search, or add a new vendor.</div></div>`;
      return;
    }

    grid.innerHTML = filtered.map(v => `
      <div class="vendor-card ${v.id === highlightId ? 'highlighted' : ''}" id="vendor-${v.id}">
        <h3>${v.name}</h3>
        ${v.contact_name ? `<div class="vendor-field"><b>Contact:</b> ${v.contact_name}</div>` : ''}
        ${v.email ? `<div class="vendor-field"><b>Email:</b> <a href="mailto:${v.email}">${v.email}</a></div>` : ''}
        ${v.phone ? `<div class="vendor-field"><b>Phone:</b> ${v.phone}</div>` : ''}
        ${v.address ? `<div class="vendor-field"><b>Address:</b> ${v.address}</div>` : ''}
        <div class="vendor-field"><b>Supplies:</b> ${(v.products || []).length} product${(v.products || []).length === 1 ? '' : 's'}</div>
        <div class="vendor-card-actions admin-only" style="display:none;">
          <button class="icon-btn" onclick="openEditVendorModal('${v.id}')">Edit</button>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.admin-only').forEach(el => { el.style.display = isAdmin ? '' : 'none'; });

    if (highlightId) {
      const el = document.getElementById(`vendor-${highlightId}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  document.getElementById('search').addEventListener('input', render);

  // ---- Add/Edit modal ----
  window.openAddVendorModal = function() {
    document.getElementById('vendor-form').reset();
    document.getElementById('v-id').value = '';
    document.getElementById('vendor-modal-title').textContent = 'Add vendor';
    document.getElementById('vendor-form-error').textContent = '';
    document.getElementById('delete-vendor-btn').style.display = 'none';
    document.getElementById('vendor-modal-overlay').style.display = 'flex';
  };

  window.openEditVendorModal = function(vendorId) {
    const v = allVendorsList.find(x => x.id === vendorId);
    if (!v) return;
    document.getElementById('vendor-form').reset();
    document.getElementById('v-id').value = v.id;
    document.getElementById('v-name').value = v.name || '';
    document.getElementById('v-contact-name').value = v.contact_name || '';
    document.getElementById('v-email').value = v.email || '';
    document.getElementById('v-phone').value = v.phone || '';
    document.getElementById('v-address').value = v.address || '';
    document.getElementById('vendor-modal-title').textContent = 'Edit ' + v.name;
    document.getElementById('vendor-form-error').textContent = '';
    document.getElementById('delete-vendor-btn').style.display = '';
    document.getElementById('vendor-modal-overlay').style.display = 'flex';
  };

  window.closeVendorModal = function() {
    document.getElementById('vendor-modal-overlay').style.display = 'none';
  };

  window.deleteCurrentVendor = async function() {
    const id = document.getElementById('v-id').value;
    if (!id) return;
    if (!confirm('Delete this vendor? Products already linked to it will keep their history, but won\'t show a vendor until you set a new one.')) return;

    const { error } = await supabaseClient.from('vendors').delete().eq('id', id);
    if (error) {
      document.getElementById('vendor-form-error').textContent = error.message;
      return;
    }
    closeVendorModal();
    loadVendors();
  };

  document.getElementById('vendor-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('vendor-form-error');
    errorEl.textContent = '';

    const id = document.getElementById('v-id').value;
    const payload = {
      name: document.getElementById('v-name').value.trim(),
      contact_name: document.getElementById('v-contact-name').value.trim() || null,
      email: document.getElementById('v-email').value.trim() || null,
      phone: document.getElementById('v-phone').value.trim() || null,
      address: document.getElementById('v-address').value.trim() || null
    };

    const { error } = id
      ? await supabaseClient.from('vendors').update(payload).eq('id', id)
      : await supabaseClient.from('vendors').insert(payload);

    if (error) {
      errorEl.textContent = error.message.includes('duplicate') ? 'A vendor with this name already exists.' : error.message;
      return;
    }

    closeVendorModal();
    loadVendors();
  });

  initAuthGate(function() {
    loadVendors();
    subscribeToTable('vendors', loadVendors);
  });
</script>

</body>
</html>
