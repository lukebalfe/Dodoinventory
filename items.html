<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory — Items</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Home screen / app-icon support -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dodo Inventory">
<meta name="theme-color" content="#4b3621">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <img src="assets/dodo-full-logo.png" alt="Dodo Coffee Co" class="login-logo">
    <p class="login-sub" style="margin-top:-4px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:11px;">Inventory</p>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<div id="app" style="display:none;">

  <nav class="topnav">
    <div class="nav-brand"><img src="assets/dodo-bird.png" alt="" class="nav-logo"> Dodo Coffee</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="items.html">Items</a>
      <a href="vendors.html">Vendors</a>
      <a href="locations.html">Locations</a>
      <a href="stock-counts.html">Stock Counts</a>
      <a href="stock-adjustments.html">Stock Adjustments</a>
      <a href="transfer-orders.html">Transfer Orders</a>
      <a href="purchase-orders.html">Purchase Orders</a>
    </div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Items</h1>
      </div>
      <button class="btn-primary admin-only" style="display:none;" onclick="openAddModal()">+ Add item</button>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="Search by name or SKU...">
      <select id="category-filter">
        <option value="">All categories</option>
      </select>
      <select id="stock-filter">
        <option value="">All stock levels</option>
        <option value="low">Low stock</option>
        <option value="out">Out of stock</option>
      </select>
      <select id="sort-by">
        <option value="name">Sort: Name (A–Z)</option>
        <option value="stock-asc">Sort: Stock (low → high)</option>
        <option value="stock-desc">Sort: Stock (high → low)</option>
        <option value="value-desc">Sort: Inventory value</option>
      </select>
      <button type="button" class="btn-secondary" onclick="exportItemsCsv()">Export CSV</button>
    </div>

    <div id="status-line" class="status-line">Loading items…</div>
    <div class="items-list" id="items-list"></div>
  </div>

</div>

<!-- Add/Edit item modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2 id="modal-title">Edit item</h2>
    <form id="item-form">
      <input type="hidden" id="f-mode" value="add">
      <input type="hidden" id="f-product-id" value="">
      <input type="hidden" id="f-item-id" value="">

      <label>Item name</label>
      <input type="text" id="f-name" required placeholder="e.g. Hot Cup">

      <label>Category</label>
      <select id="f-category">
        <option value="">No category</option>
      </select>
      <div id="new-category-row" style="display:none; margin-top:8px;">
        <input type="text" id="f-new-category" placeholder="New category name">
      </div>

      <label>Vendor</label>
      <input type="text" id="f-vendor" list="vendor-options" placeholder="e.g. Yamipak">
      <datalist id="vendor-options"></datalist>

      <div class="field-row">
        <div>
          <label>Variant (size/flavor)</label>
          <input type="text" id="f-variant" placeholder="e.g. 12oz">
        </div>
        <div>
          <label>SKU</label>
          <input type="text" id="f-sku">
        </div>
      </div>

      <label>Inventory tracking</label>
      <select id="f-tracking-type">
        <option value="stocked">Stocked item</option>
        <option value="made_to_order">Made to order — deduct components when fulfilled</option>
        <option value="non_inventory">Non-inventory item</option>
      </select>
      <div class="field-help" id="tracking-help">This item has its own physical stock count.</div>

      <label>Unit of measurement</label>
      <select id="f-unit" required>
        <option value="Bottles">Bottles</option><option value="Bags">Bags</option>
        <option value="Lbs">Lbs</option><option value="PCS">PCS</option><option value="Boxes">Boxes</option>
      </select>

      <div class="field-row">
        <div>
          <label>Cost of goods sold</label>
          <input type="number" step="0.01" id="f-purchase-price">
        </div>
        <div>
          <label>Selling price</label>
          <input type="number" step="0.01" id="f-selling-price">
        </div>
      </div>

      <input type="hidden" id="f-original-stock" value="">

      <div class="field-row">
        <div>
          <label>Stock on hand</label>
          <input type="number" id="f-stock">
        </div>
        <div>
          <label>Reorder level</label>
          <input type="number" id="f-reorder">
        </div>
      </div>

      <div id="stock-reason-section" style="display:none;">
        <label>Reason for stock change (required)</label>
        <select id="f-stock-reason">
          <option value="">Choose a reason...</option>
          <option value="Stocktaking result">Stocktaking result</option>
          <option value="Inventory reevaluation">Inventory reevaluation</option>
          <option value="Stock written off">Stock written off</option>
          <option value="Item utilized">Item utilized</option>
        </select>
        <label>Location this change applies to (required)</label>
        <select id="f-stock-location"><option value="">Choose a location...</option></select>
      </div>

      <label>Photo</label>
      <input type="file" id="f-image" accept="image/*">
      <img id="f-image-preview" class="item-thumb-preview" style="display:none;">

      <label style="display:flex; align-items:center; gap:8px; margin-top:16px; text-transform:none; font-size:13px;">
        <input type="checkbox" id="f-is-composite" style="width:auto;"> This is a composite item (made of other items)
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:10px; text-transform:none; font-size:13px;">
        <input type="checkbox" id="f-is-inactive" style="width:auto;"> Mark this item as inactive (hides it from the main list)
      </label>

      <div id="composite-section" style="display:none; margin-top:10px; border-top:1px solid var(--border); padding-top:12px;">
        <label>Components</label>
        <div id="component-rows" style="margin-bottom:10px;"></div>
        <div class="field-row">
          <input type="text" id="component-item-search" list="component-item-options" placeholder="Search item to add...">
          <input type="number" id="component-qty" placeholder="Qty per unit" value="1" min="1">
        </div>
        <datalist id="component-item-options"></datalist>
        <button type="button" class="btn-secondary" style="margin-top:8px;" onclick="addComponentRow()">+ Add component</button>
      </div>

      <div id="modal-error" class="form-error"></div>

      <div class="modal-actions">
        <div>
          <button type="button" id="delete-item-btn" class="btn-danger" style="display:none;" onclick="deleteCurrentItem()">Delete item</button>
        </div>
        <div class="right-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Safety fallback — esc() is also defined in app.js, but if a cached
  // version of app.js is served, this ensures items.html never crashes.
  if (typeof esc !== 'function') {
    window.esc = function(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    };
  }
  if (typeof fmtNum !== 'function') {
    window.fmtNum = function(v) {
      if (v === null || v === undefined || v === '') return '—';
      const n = Number(v); return Number.isNaN(n) ? String(v) : n.toLocaleString();
    };
  }
  if (typeof unitLabel !== 'function') {
    window.unitLabel = function(item, amount) {
      const unit = item?.unit_of_measure || 'PCS';
      return amount === null || amount === undefined ? `— ${unit}` : `${fmtNum(amount)} ${unit}`;
    };
  }
  let allProducts = [];
  const editItemIdFromUrl = new URLSearchParams(location.search).get('edit');
  let itemLocationMap = {}; // item_id -> [{ name, stock }]
  let allLocationsForItems = [];
  let allItemsFlatForComponents = [];
  let currentComponents = []; // { itemId, label, qty }

  function buildFlatItemList() {
    // Flatten products -> one entry per item (variant), each carrying its parent product info
    const flat = [];
    allProducts.forEach(product => {
      (product.items || []).forEach(item => {
        flat.push({ product, item });
      });
    });
    return flat.sort((a, b) => a.product.name.localeCompare(b.product.name));
  }

  function renderItemRow({ product, item }) {
    const status = stockStatus(item);
    const rowId = `row-${item.id}`;
    const variant = variantLabel(item);
    const displayName = variant && variant !== product.name ? `${product.name} — ${variant}` : product.name;

    return `
      <div class="item-row" id="${rowId}">
        <div class="item-row-summary" onclick="toggleRow('${item.id}')">
          <img class="item-thumb" src="${esc(item.image_url || '')}" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23b0a48d%27 stroke-width=%271.5%27%3E%3Cpath d=%27M21 8l-9-5-9 5 9 5 9-5z%27/%3E%3Cpath d=%27M3 8v8l9 5 9-5V8%27/%3E%3Cpath d=%27M12 13v8%27/%3E%3C/svg%3E'; this.style.padding='7px';">
          <div class="item-row-name"><a href="item-detail.html?id=${item.id}" onclick="event.stopPropagation();" style="color:inherit; text-decoration:none;">${esc(displayName)}</a>${item.tracking_type === 'made_to_order' ? ' <span class="tracking-badge made">Made to order</span>' : (item.tracking_type === 'non_inventory' ? ' <span class="tracking-badge">Non-inventory</span>' : '')}</div>
          <div class="item-row-sku">${esc(item.sku || item.item_code || '—')}</div>
          <div class="item-row-stock">${item.tracking_type === 'stocked' ? unitLabel(item, item.stock_on_hand ?? 0) : 'Not stocked'}</div>
          ${status !== 'good' ? `<span class="stamp ${status}">${stockLabel(status)}</span>` : ''}
          <div class="item-row-chevron">▸</div>
        </div>
        <div class="item-row-detail">
          <div class="detail-grid">
            <div class="detail-field"><span class="k">Category</span><span class="v">${esc(product.categories?.name || '—')}</span></div>
            <div class="detail-field"><span class="k">Vendor</span><span class="v">${esc(product.vendors?.name || '—')}</span></div>
            <div class="detail-field"><span class="k">Cost of goods sold</span><span class="v">${money(item.purchase_price)}</span></div>
            <div class="detail-field"><span class="k">Selling price</span><span class="v">${money(item.selling_price)}</span></div>
            <div class="detail-field"><span class="k">Reorder level</span><span class="v">${item.reorder_level ?? '—'}</span></div>
            <div class="detail-field"><span class="k">Location (legacy)</span><span class="v">${esc(item.location_name || '—')}</span></div>
          </div>
          ${renderLocationBreakdown(item.id)}
          <button class="icon-btn admin-only" style="display:none;" onclick="openEditModal('${product.id}', '${item.id}'); event.stopPropagation();">Edit item</button>
        </div>
      </div>
    `;
  }

  function renderLocationBreakdown(itemId) {
    const rows = itemLocationMap[itemId] || [];
    if (rows.length === 0) {
      return `<div class="location-stock-block"><span class="k">Stock by location</span><div style="color:var(--text-faint); font-size:12px; margin-top:4px;">Not assigned to any location yet.</div></div>`;
    }
    const total = rows.reduce((sum, r) => sum + (Number(r.stock) || 0), 0);
    const lines = rows.map(r => `
      <div class="loc-stock-row"><span>${esc(r.name)}</span><span>${r.stock}</span></div>
    `).join('');
    return `
      <div class="location-stock-block">
        <span class="k">Stock by location</span>
        ${lines}
        <div class="loc-stock-row total"><span>Total (all locations)</span><span>${total}</span></div>
      </div>
    `;
  }

  window.toggleRow = function(itemId) {
    document.getElementById(`row-${itemId}`).classList.toggle('expanded');
  };

  function populateCategoryFilter() {
    // Map each category name to its parent (or null if it's top-level)
    const childToParent = {};
    allProducts.forEach(p => {
      if (p.categories?.name) {
        childToParent[p.categories.name] = p.categories.parent_category || null;
      }
    });

    // Make sure parent names show up even if no product uses them directly
    const allCatNames = new Set(Object.keys(childToParent));
    Object.values(childToParent).forEach(parent => { if (parent) allCatNames.add(parent); });

    const topLevel = [...allCatNames].filter(name => !childToParent[name]).sort();

    let html = `<option value="">All categories</option>`;
    topLevel.forEach(top => {
      const subs = [...allCatNames].filter(name => childToParent[name] === top).sort();
      if (subs.length > 0) {
        html += `<optgroup label="${esc(top)}">`;
        if (childToParent.hasOwnProperty(top)) html += `<option value="${esc(top)}">${esc(top)} (all)</option>`;
        subs.forEach(sub => { html += `<option value="${esc(sub)}">${esc(sub)}</option>`; });
        html += `</optgroup>`;
      } else {
        html += `<option value="${esc(top)}">${esc(top)}</option>`;
      }
    });

    const select = document.getElementById('category-filter');
    const current = select.value;
    html += `<option value="__inactive__">Inactive items</option>`;
    select.innerHTML = html;
    select.value = current;
  }

  function render() {
    const search = document.getElementById('search').value.trim().toLowerCase();
    const categoryFilter = document.getElementById('category-filter').value;

    let flat = buildFlatItemList();

    if (categoryFilter === '__inactive__') {
      flat = flat.filter(({ item }) => item.is_active === false);
    } else {
      flat = flat.filter(({ item }) => item.is_active !== false);
      if (categoryFilter) {
        flat = flat.filter(({ product }) => product.categories?.name === categoryFilter);
      }
    }
    if (search) {
      flat = flat.filter(({ product, item }) =>
        (product.name + ' ' + (item.sku || '') + ' ' + (item.variant_name || '')).toLowerCase().includes(search)
      );
    }

    const stockFilter = document.getElementById('stock-filter').value;
    if (stockFilter) {
      flat = flat.filter(({ item }) => stockStatus(item) === stockFilter);
    }

    const sortBy = document.getElementById('sort-by').value;
    const stockOf = ({ item }) => Number(item.stock_on_hand ?? 0);
    const valueOf = ({ item }) => Number(item.stock_on_hand ?? 0) * Number(item.purchase_price ?? 0);
    if (sortBy === 'stock-asc') flat.sort((a, b) => stockOf(a) - stockOf(b));
    else if (sortBy === 'stock-desc') flat.sort((a, b) => stockOf(b) - stockOf(a));
    else if (sortBy === 'value-desc') flat.sort((a, b) => valueOf(b) - valueOf(a));
    // 'name' is the default order from buildFlatItemList()

    lastRenderedFlat = flat; // remembered so Export CSV matches what's on screen

    const list = document.getElementById('items-list');
    const statusLine = document.getElementById('status-line');

    if (flat.length === 0) {
      list.innerHTML = '';
      statusLine.textContent = 'No items match.';
      return;
    }

    statusLine.textContent = `${flat.length} item${flat.length === 1 ? '' : 's'}`;

    const html = flat.map(entry => renderItemRow(entry)).join('');
    list.innerHTML = html;

    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = isAdmin ? '' : 'none';
    });
  }

  let lastRenderedFlat = [];

  function debounce(fn, delay) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  document.getElementById('search').addEventListener('input', debounce(render, 200));
  document.getElementById('category-filter').addEventListener('change', render);
  document.getElementById('stock-filter').addEventListener('change', render);
  document.getElementById('sort-by').addEventListener('change', render);

  // ---- CSV export (exports whatever is currently filtered/sorted on screen) ----
  window.exportItemsCsv = function() {
    if (lastRenderedFlat.length === 0) {
      alert('Nothing to export — no items match the current filters.');
      return;
    }

    const csvCell = (v) => {
      if (v === null || v === undefined) return '';
      const s = String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };

    const header = ['Name', 'Variant', 'SKU', 'Category', 'Vendor', 'Stock on hand', 'Reorder level', 'Stock status', 'Cost of goods sold', 'Selling price', 'Inventory value'];
    const rows = lastRenderedFlat.map(({ product, item }) => {
      const stock = Number(item.stock_on_hand ?? 0);
      const cost = Number(item.purchase_price ?? 0);
      return [
        product.name,
        variantLabel(item) || '',
        item.sku || item.item_code || '',
        product.categories?.name || '',
        product.vendors?.name || '',
        item.stock_on_hand ?? '',
        item.reorder_level ?? '',
        stockLabel(stockStatus(item)) || 'In stock',
        item.purchase_price ?? '',
        item.selling_price ?? '',
        (stock * cost).toFixed(2)
      ].map(csvCell).join(',');
    });

    const csv = [header.join(','), ...rows].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dodo-inventory-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  async function loadItems() {
    const { data, error } = await supabaseClient
      .from('products')
      .select(`
        id, name, product_code, description,
        categories ( name, parent_category ),
        vendors ( name ),
        items ( id, item_code, variant_name, sku, purchase_price, selling_price,
                stock_on_hand, reorder_level, location_name, image_url, is_composite, is_active, tracking_type, unit_of_measure,
                attribute1_value, attribute2_value, attribute3_value )
      `)
      .order('name');

    if (error) {
      document.getElementById('status-line').textContent = '';
      document.getElementById('items-list').innerHTML = `
        <div class="error-state"><h2>Couldn't load items</h2><div>${esc(error.message)}</div></div>`;
      return;
    }

    allProducts = data;

    const { data: locsList } = await supabaseClient.from('locations').select('id, name').order('name');
    allLocationsForItems = locsList || [];

    const { data: locData, error: locDataErr } = await supabaseClient
      .from('item_locations')
      .select(`item_id, stock_on_hand, locations!location_id ( name )`);

    if (locDataErr) console.error('Could not load per-location stock:', locDataErr.message);

    itemLocationMap = {};
    (locData || []).forEach(row => {
      if (!itemLocationMap[row.item_id]) itemLocationMap[row.item_id] = [];
      itemLocationMap[row.item_id].push({ name: row.locations?.name || 'Unknown', stock: row.stock_on_hand ?? 0 });
    });

    populateCategoryFilter();
    render();
  }

  // ---- Add/Edit modal ----
  const modalOverlay = document.getElementById('modal-overlay');
  const itemForm = document.getElementById('item-form');
  let selectedImageFile = null;

  function populateCategorySelect(selectedName) {
    const childToParent = {};
    allProducts.forEach(p => {
      if (p.categories?.name) {
        childToParent[p.categories.name] = p.categories.parent_category || null;
      }
    });
    const allCatNames = new Set(Object.keys(childToParent));
    Object.values(childToParent).forEach(parent => { if (parent) allCatNames.add(parent); });
    const topLevel = [...allCatNames].filter(name => !childToParent[name]).sort();

    let html = `<option value="">No category</option>`;
    topLevel.forEach(top => {
      const subs = [...allCatNames].filter(name => childToParent[name] === top).sort();
      if (subs.length > 0) {
        html += `<optgroup label="${esc(top)}">`;
        if (childToParent.hasOwnProperty(top)) html += `<option value="${esc(top)}">${esc(top)}</option>`;
        subs.forEach(sub => { html += `<option value="${esc(sub)}">${esc(sub)}</option>`; });
        html += `</optgroup>`;
      } else {
        html += `<option value="${esc(top)}">${esc(top)}</option>`;
      }
    });
    html += `<option value="__new__">+ Add new category...</option>`;

    const select = document.getElementById('f-category');
    select.innerHTML = html;
    select.value = selectedName && allCatNames.has(selectedName) ? selectedName : '';
  }

  document.getElementById('f-category').addEventListener('change', (e) => {
    const row = document.getElementById('new-category-row');
    row.style.display = e.target.value === '__new__' ? 'block' : 'none';
    if (e.target.value === '__new__') document.getElementById('f-new-category').focus();
  });

  function populateDatalists() {
    const vends = [...new Set(allProducts.map(p => p.vendors?.name).filter(Boolean))];
    document.getElementById('vendor-options').innerHTML = vends.map(v => `<option value="${esc(v)}">`).join('');

    // Component picker list, built from the same product/item data already loaded
    allItemsFlatForComponents = [];
    allProducts.forEach(p => {
      (p.items || []).forEach(item => {
        const variant = item.attribute1_value || item.variant_name;
        const label = variant && variant !== p.name ? `${p.name} — ${variant}` : p.name;
        allItemsFlatForComponents.push({ id: item.id, label: label + (item.sku ? ` (${item.sku})` : '') });
      });
    });
    document.getElementById('component-item-options').innerHTML =
      allItemsFlatForComponents.map(i => `<option value="${esc(i.label)}">`).join('');
  }

  document.getElementById('f-is-composite').addEventListener('change', (e) => {
    document.getElementById('composite-section').style.display = e.target.checked ? 'block' : 'none';
  });

  function updateTrackingUi() {
    const type = document.getElementById('f-tracking-type').value;
    const made = type === 'made_to_order';
    document.getElementById('f-is-composite').checked = made;
    document.getElementById('f-is-composite').disabled = made;
    document.getElementById('composite-section').style.display = made || document.getElementById('f-is-composite').checked ? 'block' : 'none';
    document.getElementById('f-stock').disabled = type !== 'stocked';
    document.getElementById('f-reorder').disabled = type !== 'stocked';
    document.getElementById('tracking-help').textContent = made
      ? 'This item is not stocked. Its BOM components are deducted during fulfillment.'
      : (type === 'non_inventory' ? 'No stock or component deductions will be recorded.' : 'This item has its own physical stock count.');
  }
  document.getElementById('f-tracking-type').addEventListener('change', updateTrackingUi);

  window.addComponentRow = function() {
    const label = document.getElementById('component-item-search').value.trim();
    const qty = Number(document.getElementById('component-qty').value) || 1;
    const match = allItemsFlatForComponents.find(i => i.label === label);
    if (!match) { alert('Please pick an item from the list.'); return; }

    const currentItemId = document.getElementById('f-item-id').value;
    if (match.id === currentItemId) { alert('An item cannot be a component of itself.'); return; }
    if (currentComponents.some(c => c.itemId === match.id)) { alert('That item is already added.'); return; }

    currentComponents.push({ itemId: match.id, label: match.label, qty });
    document.getElementById('component-item-search').value = '';
    document.getElementById('component-qty').value = '1';
    renderComponentRows();
  };

  window.removeComponentRow = function(index) {
    currentComponents.splice(index, 1);
    renderComponentRows();
  };

  function renderComponentRows() {
    const wrap = document.getElementById('component-rows');
    if (currentComponents.length === 0) {
      wrap.innerHTML = `<div style="color:var(--text-faint); font-size:12px;">No components added yet.</div>`;
      return;
    }
    wrap.innerHTML = currentComponents.map((c, i) => `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px;">
        <span>${esc(c.label)} × ${c.qty}</span>
        <button type="button" class="icon-btn" onclick="removeComponentRow(${i})">Remove</button>
      </div>
    `).join('');
  }

  function resetImagePicker() {
    selectedImageFile = null;
    document.getElementById('f-image').value = '';
    document.getElementById('f-image-preview').style.display = 'none';
  }

  document.getElementById('f-image').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const bitmap = await createImageBitmap(file);
    if (bitmap.width < 800 || bitmap.height < 800) {
      selectedImageFile = null;
      e.target.value = '';
      document.getElementById('modal-error').textContent = 'Please use an image at least 800 × 800 pixels so it stays sharp.';
      bitmap.close();
      return;
    }
    bitmap.close();
    document.getElementById('modal-error').textContent = '';
    selectedImageFile = file;
    const preview = document.getElementById('f-image-preview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  });

  document.getElementById('f-stock').addEventListener('input', () => {
    const mode = document.getElementById('f-mode').value;
    const original = document.getElementById('f-original-stock').value;
    const current = document.getElementById('f-stock').value;
    const changed = mode === 'edit' && String(original) !== String(current);
    document.getElementById('stock-reason-section').style.display = changed ? 'block' : 'none';
  });

  window.openAddModal = function() {
    itemForm.reset();
    resetImagePicker();
    document.getElementById('f-mode').value = 'add';
    document.getElementById('f-product-id').value = '';
    document.getElementById('f-item-id').value = '';
    document.getElementById('modal-title').textContent = 'Add item';
    document.getElementById('modal-error').textContent = '';
    document.getElementById('delete-item-btn').style.display = 'none';
    document.getElementById('stock-reason-section').style.display = 'none';
    document.getElementById('f-original-stock').value = '';
    document.getElementById('f-is-composite').checked = false;
    document.getElementById('composite-section').style.display = 'none';
    document.getElementById('f-is-inactive').checked = false;
    document.getElementById('f-tracking-type').value = 'stocked';
    document.getElementById('f-unit').value = 'PCS';
    updateTrackingUi();
    currentComponents = [];
    renderComponentRows();
    document.getElementById('new-category-row').style.display = 'none';
    document.getElementById('f-new-category').value = '';
    populateDatalists();
    populateCategorySelect('');
    modalOverlay.style.display = 'flex';
  };

  window.openEditModal = async function(productId, itemId) {
    const product = allProducts.find(p => p.id === productId);
    const item = (product.items || []).find(i => i.id === itemId);

    itemForm.reset();
    resetImagePicker();
    document.getElementById('f-mode').value = 'edit';
    document.getElementById('f-product-id').value = product.id;
    document.getElementById('f-item-id').value = item.id;
    document.getElementById('modal-title').textContent = 'Edit ' + product.name;
    document.getElementById('modal-error').textContent = '';
    document.getElementById('delete-item-btn').style.display = '';
    document.getElementById('stock-reason-section').style.display = 'none';

    document.getElementById('f-name').value = product.name || '';
    document.getElementById('f-vendor').value = product.vendors?.name || '';
    document.getElementById('f-variant').value = item.attribute1_value || item.variant_name || '';
    document.getElementById('f-sku').value = item.sku || '';
    document.getElementById('f-purchase-price').value = item.purchase_price ?? '';
    document.getElementById('f-selling-price').value = item.selling_price ?? '';
    document.getElementById('f-stock').value = item.stock_on_hand ?? '';
    document.getElementById('f-original-stock').value = item.stock_on_hand ?? '';
    document.getElementById('f-reorder').value = item.reorder_level ?? '';
    document.getElementById('f-tracking-type').value = item.tracking_type || 'stocked';
    document.getElementById('f-unit').value = item.unit_of_measure || 'PCS';

    const locSelect = document.getElementById('f-stock-location');
    locSelect.innerHTML = '<option value="">Choose a location...</option>' +
      allLocationsForItems.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');

    if (item.image_url) {
      const preview = document.getElementById('f-image-preview');
      preview.src = item.image_url;
      preview.style.display = 'block';
    }

    document.getElementById('f-is-composite').checked = !!item.is_composite;
    document.getElementById('composite-section').style.display = item.is_composite ? 'block' : 'none';
    document.getElementById('f-is-inactive').checked = item.is_active === false;
    updateTrackingUi();
    currentComponents = [];
    renderComponentRows();
    document.getElementById('new-category-row').style.display = 'none';
    document.getElementById('f-new-category').value = '';
    populateDatalists();
    populateCategorySelect(product.categories?.name || '');
    modalOverlay.style.display = 'flex';

    if (item.is_composite) {
      const { data: components } = await supabaseClient
        .from('composite_components')
        .select(`quantity_required, component_item_id, items:component_item_id ( sku, variant_name, attribute1_value, products ( name ) )`)
        .eq('composite_item_id', itemId);

      currentComponents = (components || []).map(c => {
        const productName = c.items?.products?.name || '';
        const variant = c.items?.attribute1_value || c.items?.variant_name;
        const label = (variant && variant !== productName ? `${productName} — ${variant}` : productName) + (c.items?.sku ? ` (${c.items.sku})` : '');
        return { itemId: c.component_item_id, label, qty: c.quantity_required };
      });
      renderComponentRows();
    }
  };

  window.closeModal = function() {
    modalOverlay.style.display = 'none';
  };

  async function uploadImageIfNeeded(itemId) {
    if (!selectedImageFile) return undefined; // no change
    const ext = selectedImageFile.name.split('.').pop();
    const path = `${itemId}-${Date.now()}.${ext}`;
    const { error } = await supabaseClient.storage.from('item-images').upload(path, selectedImageFile, { upsert: true });
    if (error) throw error;
    const { data } = supabaseClient.storage.from('item-images').getPublicUrl(path);
    return data.publicUrl;
  }

  window.deleteCurrentItem = async function() {
    const itemId = document.getElementById('f-item-id').value;
    if (!itemId) return;
    if (!confirm('Delete this item? This can\'t be undone.')) return;

    const { error } = await supabaseClient.from('items').delete().eq('id', itemId);
    if (error) {
      document.getElementById('modal-error').textContent = error.message;
      return;
    }
    closeModal();
    loadItems();
  };

  itemForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('modal-error');
    errorEl.textContent = '';

    const mode = document.getElementById('f-mode').value;
    const name = document.getElementById('f-name').value.trim();
    const categorySelectValue = document.getElementById('f-category').value;
    const categoryName = categorySelectValue === '__new__'
      ? document.getElementById('f-new-category').value.trim()
      : categorySelectValue;
    if (categorySelectValue === '__new__' && !categoryName) {
      errorEl.textContent = 'Please type a name for the new category, or choose an existing one.';
      return;
    }
    const vendorName = document.getElementById('f-vendor').value.trim();
    const variant = document.getElementById('f-variant').value.trim();
    const sku = document.getElementById('f-sku').value.trim() || null;
    const purchasePrice = document.getElementById('f-purchase-price').value;
    const sellingPrice = document.getElementById('f-selling-price').value;
    const stock = document.getElementById('f-stock').value;
    const reorder = document.getElementById('f-reorder').value;
    const originalStock = document.getElementById('f-original-stock').value;
    const stockReason = document.getElementById('f-stock-reason').value.trim();
    const stockLocationId = document.getElementById('f-stock-location').value;
    const stockChanged = mode === 'edit' && String(originalStock) !== String(stock);
    const trackingType = document.getElementById('f-tracking-type').value;
    const unitOfMeasure = document.getElementById('f-unit').value;

    if (stockChanged) {
      if (!stockReason) {
        errorEl.textContent = 'Please give a reason for the stock change.';
        return;
      }
      if (!stockLocationId) {
        errorEl.textContent = 'Please choose which location this stock change applies to.';
        return;
      }
    }

    try {
      const categoryId = await getOrCreateByName('categories', categoryName);
      const vendorId = await getOrCreateByName('vendors', vendorName);
      let productId = document.getElementById('f-product-id').value || null;
      let itemId = document.getElementById('f-item-id').value || null;

      if (mode === 'add') {
        const { data: existingProduct } = await supabaseClient
          .from('products').select('id').eq('name', name).maybeSingle();

        if (existingProduct) {
          productId = existingProduct.id;
          await supabaseClient.from('products').update({ category_id: categoryId, vendor_id: vendorId }).eq('id', productId);
        } else {
          const { data: newProduct, error: prodErr } = await supabaseClient
            .from('products')
            .insert({ name, category_id: categoryId, vendor_id: vendorId, product_code: slugify(name) })
            .select('id').single();
          if (prodErr) throw prodErr;
          productId = newProduct.id;
        }

        const { data: newItem, error: itemErr } = await supabaseClient.from('items').insert({
          product_id: productId,
          variant_name: variant || name,
          sku,
          purchase_price: purchasePrice === '' ? null : Number(purchasePrice),
          selling_price: sellingPrice === '' ? null : Number(sellingPrice),
          stock_on_hand: trackingType === 'stocked' && stock !== '' ? Number(stock) : null,
          reorder_level: trackingType === 'stocked' && reorder !== '' ? Number(reorder) : null,
          tracking_type: trackingType,
          unit_of_measure: unitOfMeasure,
          attribute1_name: variant ? 'Variant' : null,
          attribute1_value: variant || null,
          item_code: sku || (slugify(variant || name) + '-' + Date.now().toString().slice(-5))
        }).select('id').single();
        if (itemErr) throw itemErr;
        itemId = newItem.id;

      } else {
        await supabaseClient.from('products').update({
          name, category_id: categoryId, vendor_id: vendorId
        }).eq('id', productId);

        const { error: itemErr } = await supabaseClient.from('items').update({
          variant_name: variant || name,
          sku,
          purchase_price: purchasePrice === '' ? null : Number(purchasePrice),
          selling_price: sellingPrice === '' ? null : Number(sellingPrice),
          stock_on_hand: trackingType === 'stocked' && stock !== '' ? Number(stock) : null,
          reorder_level: trackingType === 'stocked' && reorder !== '' ? Number(reorder) : null,
          tracking_type: trackingType,
          unit_of_measure: unitOfMeasure,
          attribute1_name: variant ? 'Variant' : null,
          attribute1_value: variant || null
        }).eq('id', itemId);
        if (itemErr) throw itemErr;

        if (stockChanged) {
          const { data: { user } } = await supabaseClient.auth.getUser();
          await supabaseClient.from('stock_adjustments').insert({
            item_id: itemId,
            location_id: stockLocationId,
            previous_stock: originalStock === '' ? null : Number(originalStock),
            new_stock: stock === '' ? null : Number(stock),
            reason: stockReason,
            changed_by: user?.id || null
          });

          // Keep the per-location breakdown in sync too — create the
          // assignment if it doesn't exist yet, or update it if it does.
          await supabaseClient.from('item_locations').upsert({
            item_id: itemId,
            location_id: stockLocationId,
            stock_on_hand: stock === '' ? null : Number(stock)
          }, { onConflict: 'item_id,location_id' });
        }
      }

      const imageUrl = await uploadImageIfNeeded(itemId);
      if (imageUrl !== undefined) {
        await supabaseClient.from('items').update({ image_url: imageUrl }).eq('id', itemId);
      }

      const isComposite = trackingType === 'made_to_order' || document.getElementById('f-is-composite').checked;
      const isActive = !document.getElementById('f-is-inactive').checked;
      await supabaseClient.from('items').update({ is_composite: isComposite, is_active: isActive }).eq('id', itemId);

      // Replace this item's component list wholesale — simpler and safer
      // than trying to diff additions/removals.
      await supabaseClient.from('composite_components').delete().eq('composite_item_id', itemId);
      if (isComposite && currentComponents.length > 0) {
        const componentRows = currentComponents.map(c => ({
          composite_item_id: itemId,
          component_item_id: c.itemId,
          quantity_required: c.qty
        }));
        await supabaseClient.from('composite_components').insert(componentRows);
      }

      if (mode === 'edit' && editItemIdFromUrl && itemId === editItemIdFromUrl) {
        location.href = 'item-detail.html?id=' + encodeURIComponent(itemId);
        return;
      }

      closeModal();
      loadItems();

    } catch (err) {
      errorEl.textContent = err.message || 'Something went wrong saving this.';
    }
  });

  initAuthGate(function() {
    loadItems().then(() => {
      if (editItemIdFromUrl) {
        const owningProduct = allProducts.find(p => (p.items || []).some(i => i.id === editItemIdFromUrl));
        if (owningProduct) openEditModal(owningProduct.id, editItemIdFromUrl);
      }
    });
    subscribeToTable('item_locations', loadItems);
    subscribeToTable('items', loadItems);
  });
</script>

</body>
