<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory — Transfer Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Home screen / app-icon support -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dodo Inventory">
<meta name="theme-color" content="#4b3621">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .to-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .to-table th { text-align: left; color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .to-table td { padding: 10px; border-bottom: 1px solid var(--border); }
  .to-table tr:last-child td { border-bottom: none; }
  .status-pill { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .status-pill.pending { color: var(--stock-low); background: var(--stock-low-bg); }
  .status-pill.completed { color: var(--stock-good); background: var(--stock-good-bg); }
  .section-title { font-family: var(--font-display); font-size: 16px; margin: 28px 0 10px; }
  .section-title:first-child { margin-top: 0; }

  @media print {
    .no-print { display: none !important; }
    body { background: #fff; color: #000; }
    .print-sheet { display: block !important; }
  }
  .print-sheet { display: none; }
  .print-sheet h2 { font-family: var(--font-display); }
  .print-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .print-table th, .print-table td { border: 1px solid #999; padding: 6px 10px; text-align: left; font-size: 13px; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <img src="assets/dodo-full-logo.png" alt="Dodo Coffee Co" class="login-logo">
    <p class="login-sub" style="margin-top:-4px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:11px;">Inventory</p>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<div id="app" style="display:none;" class="no-print">

  <nav class="topnav">
    <div class="nav-brand"><img src="assets/dodo-bird.png" alt="" class="nav-logo"> Dodo Coffee</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="items.html">Items</a>
      <a href="vendors.html">Vendors</a>
      <a href="locations.html">Locations</a>
      <a href="stock-counts.html">Stock Counts</a>
      <a href="stock-adjustments.html">Stock Adjustments</a>
      <a href="transfer-orders.html">Transfer Orders</a>
      <a href="purchase-orders.html">Purchase Orders</a>
    </div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Transfer Orders</h1>
        <p>Pending replenishments and completed transfers</p>
      </div>
    </div>

    <div class="section-title">Pending replenishments</div>
    <div class="controls">
      <select id="location-filter">
        <option value="">All locations</option>
      </select>
      <button class="btn-primary admin-only" style="display:none;" id="create-transfer-btn" onclick="createTransferOrder()" disabled>Create Transfer Order from selected</button>
    </div>
    <div id="pending-status-line" class="status-line">Loading…</div>
    <div id="pending-table-wrap"></div>

    <div class="section-title">Transfer orders</div>
    <div id="orders-status-line" class="status-line">Loading…</div>
    <div id="orders-table-wrap"></div>
  </div>
</div>

<!-- Printable sheet -->
<div class="print-sheet" id="print-sheet"></div>

<script src="app.js"></script>
<script>
  let allLocationsForTO = [];
  let pendingReplenishments = [];
  let selectedReplenishmentIds = new Set();

  function fmtDateTime(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  async function loadLocationFilter() {
    const { data } = await supabaseClient.from('locations').select('id, name').order('name');
    allLocationsForTO = data || [];
    const select = document.getElementById('location-filter');
    const current = select.value;
    select.innerHTML = '<option value="">All locations</option>' + allLocationsForTO.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    select.value = current;
  }

  async function loadPendingReplenishments() {
    const { data, error } = await supabaseClient
      .from('replenishments')
      .select(`id, current_stock, reorder_level, max_stock, replenishment_amount, location_id, source_location_id,
                items ( id, sku, variant_name, attribute1_value, products ( name ) ),
                destination:location_id ( name ),
                source:source_location_id ( name )`)
      .eq('replenishment_type', 'transfer')
      .eq('status', 'pending')
      .order('created_at', { ascending: true });

    const statusLine = document.getElementById('pending-status-line');
    const wrap = document.getElementById('pending-table-wrap');

    if (error) {
      statusLine.textContent = '';
      wrap.innerHTML = `<div class="error-state"><h2>Couldn't load pending replenishments</h2><div>${error.message}</div></div>`;
      return;
    }

    pendingReplenishments = data || [];
    renderPendingTable();
  }

  function renderPendingTable() {
    const locationFilter = document.getElementById('location-filter').value;
    const filtered = locationFilter ? pendingReplenishments.filter(r => r.location_id === locationFilter) : pendingReplenishments;

    document.getElementById('pending-status-line').textContent = `${filtered.length} pending`;
    document.getElementById('create-transfer-btn').disabled = !(locationFilter && selectedReplenishmentIds.size > 0);

    const wrap = document.getElementById('pending-table-wrap');
    if (filtered.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><h2>Nothing pending</h2><div>Replenishments appear here automatically when stock falls at or below its reorder point.</div></div>`;
      return;
    }

    if (!locationFilter) {
      wrap.innerHTML = `<div class="empty-state"><h2>Choose a location above</h2><div>Filter to a specific location to select items and create a Transfer Order.</div></div>`;
      return;
    }

    const rows = filtered.map(r => {
      const item = r.items;
      const productName = item?.products?.name || '';
      const variant = item?.attribute1_value || item?.variant_name;
      const label = variant && variant !== productName ? `${productName} — ${variant}` : productName;
      const checked = selectedReplenishmentIds.has(r.id) ? 'checked' : '';

      return `
        <tr>
          <td><input type="checkbox" onchange="toggleSelect('${r.id}', this.checked)" ${checked}></td>
          <td>${label || '—'}</td>
          <td>${item?.sku || '—'}</td>
          <td>${r.source?.name || '—'}</td>
          <td>${r.current_stock ?? 0}</td>
          <td>${r.reorder_level ?? '—'}</td>
          <td>${r.max_stock ?? '—'}</td>
          <td><strong>${r.replenishment_amount ?? 0}</strong></td>
        </tr>
      `;
    }).join('');

    wrap.innerHTML = `
      <div class="table-scroll"><table class="to-table">
        <thead><tr><th></th><th>Item</th><th>SKU</th><th>From location</th><th>Current stock</th><th>Reorder level</th><th>Max stock</th><th>Replenish qty</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    `;
  }

  window.toggleSelect = function(id, checked) {
    if (checked) selectedReplenishmentIds.add(id);
    else selectedReplenishmentIds.delete(id);
    document.getElementById('create-transfer-btn').disabled = !(document.getElementById('location-filter').value && selectedReplenishmentIds.size > 0);
  };

  document.getElementById('location-filter').addEventListener('change', () => {
    selectedReplenishmentIds.clear();
    renderPendingTable();
  });

  window.createTransferOrder = async function() {
    const locationId = document.getElementById('location-filter').value;
    const selected = pendingReplenishments.filter(r => selectedReplenishmentIds.has(r.id));
    if (selected.length === 0) return;

    try {
      const { data: order, error: orderErr } = await supabaseClient.from('transfer_orders').insert({
        destination_location_id: locationId, status: 'pending'
      }).select('id').single();
      if (orderErr) throw orderErr;

      const lineItems = selected.map(r => ({
        transfer_order_id: order.id,
        replenishment_id: r.id,
        item_id: r.items.id,
        source_location_id: r.source_location_id,
        quantity: r.replenishment_amount
      }));
      const { error: lineErr } = await supabaseClient.from('transfer_order_items').insert(lineItems);
      if (lineErr) throw lineErr;

      for (const r of selected) {
        await supabaseClient.from('replenishments').update({
          status: 'ordered', order_table: 'transfer_orders', order_id: order.id
        }).eq('id', r.id);
      }

      selectedReplenishmentIds.clear();
      printTransferOrder(order.id);
      loadPendingReplenishments();
      loadTransferOrders();
    } catch (err) {
      alert('Could not create transfer order: ' + err.message);
    }
  };

  async function loadTransferOrders() {
    const { data, error } = await supabaseClient
      .from('transfer_orders')
      .select(`id, status, created_at, completed_at, locations ( name )`)
      .order('created_at', { ascending: false });

    const statusLine = document.getElementById('orders-status-line');
    const wrap = document.getElementById('orders-table-wrap');

    if (error) {
      statusLine.textContent = '';
      wrap.innerHTML = `<div class="error-state"><h2>Couldn't load transfer orders</h2><div>${error.message}</div></div>`;
      return;
    }

    statusLine.textContent = `${data.length} order${data.length === 1 ? '' : 's'}`;

    if (data.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><h2>No transfer orders yet</h2><div>Create one from the pending replenishments above.</div></div>`;
      return;
    }

    const rows = data.map(o => `
      <tr>
        <td>${o.locations?.name || '—'}</td>
        <td><span class="status-pill ${o.status}">${o.status}</span></td>
        <td>${fmtDateTime(o.created_at)}</td>
        <td>${o.completed_at ? fmtDateTime(o.completed_at) : '—'}</td>
        <td>
          <button class="btn-secondary" onclick="printTransferOrder('${o.id}')">Print / Save PDF</button>
          ${o.status === 'pending' ? `<button class="btn-primary admin-only" style="display:${isAdmin ? '' : 'none'};" onclick="completeTransferOrder('${o.id}')">Mark completed</button>` : ''}
        </td>
      </tr>
    `).join('');

    wrap.innerHTML = `
      <div class="table-scroll"><table class="to-table">
        <thead><tr><th>Destination</th><th>Status</th><th>Created</th><th>Completed</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    `;

    document.querySelectorAll('.admin-only').forEach(el => { el.style.display = isAdmin ? '' : 'none'; });
  }

  window.printTransferOrder = async function(orderId) {
    const { data: order } = await supabaseClient.from('transfer_orders').select(`id, created_at, locations ( name )`).eq('id', orderId).single();
    const { data: items } = await supabaseClient
      .from('transfer_order_items')
      .select(`quantity, items ( sku, variant_name, attribute1_value, products ( name ) ), locations ( name )`)
      .eq('transfer_order_id', orderId);

    const rows = (items || []).map(li => {
      const productName = li.items?.products?.name || '';
      const variant = li.items?.attribute1_value || li.items?.variant_name;
      const label = variant && variant !== productName ? `${productName} — ${variant}` : productName;
      return `<tr><td>${label}</td><td>${li.items?.sku || '—'}</td><td>${li.locations?.name || '—'}</td><td>${li.quantity}</td></tr>`;
    }).join('');

    document.getElementById('print-sheet').innerHTML = `
      <h2>Transfer Order</h2>
      <p>Destination: <strong>${order?.locations?.name || '—'}</strong><br>
      Created: ${fmtDateTime(order?.created_at)}</p>
      <table class="print-table">
        <thead><tr><th>Item</th><th>SKU</th><th>From location</th><th>Quantity</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
    setTimeout(() => window.print(), 100);
  };

  window.completeTransferOrder = async function(orderId) {
    if (!confirm('Mark this transfer as completed? This will move the stock automatically.')) return;

    const { data: items, error: itemsErr } = await supabaseClient
      .from('transfer_order_items')
      .select(`item_id, source_location_id, quantity, replenishment_id`)
      .eq('transfer_order_id', orderId);
    if (itemsErr) { alert(itemsErr.message); return; }

    const { data: order } = await supabaseClient.from('transfer_orders').select('destination_location_id').eq('id', orderId).single();

    try {
      for (const li of items) {
        const { data: sourceRow } = await supabaseClient
          .from('item_locations').select('id, stock_on_hand')
          .eq('item_id', li.item_id).eq('location_id', li.source_location_id).maybeSingle();
        if (sourceRow) {
          const newSourceStock = Math.max(0, Number(sourceRow.stock_on_hand || 0) - Number(li.quantity));
          await supabaseClient.from('item_locations').update({ stock_on_hand: newSourceStock }).eq('id', sourceRow.id);
        }

        const { data: destRow } = await supabaseClient
          .from('item_locations').select('id, stock_on_hand')
          .eq('item_id', li.item_id).eq('location_id', order.destination_location_id).maybeSingle();
        if (destRow) {
          const newDestStock = Number(destRow.stock_on_hand || 0) + Number(li.quantity);
          await supabaseClient.from('item_locations').update({ stock_on_hand: newDestStock }).eq('id', destRow.id);
        }

        if (li.replenishment_id) {
          await supabaseClient.from('replenishments').update({ status: 'completed' }).eq('id', li.replenishment_id);
        }
      }

      await supabaseClient.from('transfer_orders')
        .update({ status: 'completed', completed_at: new Date().toISOString() })
        .eq('id', orderId);

      loadTransferOrders();
    } catch (err) {
      alert('Something went wrong completing this transfer: ' + err.message);
    }
  };

  initAuthGate(function() {
    loadLocationFilter();
    loadPendingReplenishments();
    loadTransferOrders();
    subscribeToTable('replenishments', loadPendingReplenishments);
    subscribeToTable('transfer_orders', loadTransferOrders);
  });
</script>

</body>
</html>
