<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodo Coffee Inventory — Stock Adjustments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Home screen / app-icon support -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dodo Inventory">
<meta name="theme-color" content="#4b3621">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .adj-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .adj-table th { text-align: left; color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .adj-table td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .adj-table tr:last-child td { border-bottom: none; }
  .adj-change.up { color: var(--stock-good); }
  .adj-change.down { color: var(--stock-out); }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-box">
    <img src="assets/dodo-full-logo.png" alt="Dodo Coffee Co" class="login-logo">
    <p class="login-sub" style="margin-top:-4px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:11px;">Inventory</p>
    <p class="login-sub">Sign in with your team account</p>
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div id="login-error" class="form-error"></div>
  </form>
</div>

<div id="app" style="display:none;">

  <nav class="topnav">
    <div class="nav-brand"><img src="assets/dodo-bird.png" alt="" class="nav-logo"> Dodo Coffee</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="items.html">Items</a>
      <a href="vendors.html">Vendors</a>
      <a href="locations.html">Locations</a>
      <a href="stock-adjustments.html">Stock Adjustments</a>
      <a href="transfer-orders.html">Transfer Orders</a>
      <a href="purchase-orders.html">Purchase Orders</a>
    </div>
    <button id="signout-btn" class="signout-btn">Sign out</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Stock Adjustments</h1>
        <p>Every manual stock change, logged</p>
      </div>
      <button class="btn-primary admin-only" style="display:none;" onclick="openAdjustModal()">+ Adjust stock</button>
    </div>

    <div id="status-line" class="status-line">Loading…</div>
    <div id="adj-table-wrap"></div>
  </div>

</div>

<!-- Adjust stock modal -->
<div id="adjust-modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2>Adjust stock</h2>
    <form id="adjust-form">
      <label>Item</label>
      <input type="text" id="adjust-item-search" list="adjust-item-options" placeholder="Start typing a product or SKU..." required>
      <datalist id="adjust-item-options"></datalist>

      <label>Location this applies to</label>
      <select id="adjust-location" required><option value="">Choose a location...</option></select>

      <label>New stock count</label>
      <input type="number" id="adjust-new-stock" required>

      <label>Reason</label>
      <input type="text" id="adjust-reason" required placeholder="e.g. Physical recount, damaged goods">

      <div id="adjust-form-error" class="form-error"></div>
      <div class="modal-actions">
        <div></div>
        <div class="right-actions">
          <button type="button" class="btn-secondary" onclick="closeAdjustModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save adjustment</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
<script>
  let allItemsFlatForAdjust = [];
  let allLocationsForAdjust = [];

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  async function loadAdjustments() {
    const { data, error } = await supabaseClient
      .from('stock_adjustments')
      .select(`id, previous_stock, new_stock, reason, created_at,
                items ( sku, variant_name, attribute1_value, products ( name ) ),
                locations ( name )`)
      .order('created_at', { ascending: false });

    const statusLine = document.getElementById('status-line');
    const wrap = document.getElementById('adj-table-wrap');

    if (error) {
      statusLine.textContent = '';
      wrap.innerHTML = `<div class="error-state"><h2>Couldn't load adjustments</h2><div>${error.message}</div></div>`;
      return;
    }

    statusLine.textContent = `${data.length} adjustment${data.length === 1 ? '' : 's'}`;

    if (data.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><h2>No adjustments yet</h2><div>Manual stock changes will show up here.</div></div>`;
      return;
    }

    const rows = data.map(row => {
      const item = row.items;
      const productName = item?.products?.name || '';
      const variant = item?.attribute1_value || item?.variant_name;
      const label = variant && variant !== productName ? `${productName} — ${variant}` : productName;
      const change = (Number(row.new_stock) || 0) - (Number(row.previous_stock) || 0);
      const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : '');
      const changeSign = change > 0 ? '+' : '';

      return `
        <tr>
          <td>${fmtDate(row.created_at)}</td>
          <td>${label || '—'}</td>
          <td>${row.locations?.name || '—'}</td>
          <td>${row.previous_stock ?? '—'} → ${row.new_stock ?? '—'}</td>
          <td class="adj-change ${changeClass}">${changeSign}${change}</td>
          <td>${row.reason || '—'}</td>
        </tr>
      `;
    }).join('');

    wrap.innerHTML = `
      <table class="adj-table">
        <thead><tr><th>When</th><th>Item</th><th>Location</th><th>Change</th><th>Δ</th><th>Reason</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    document.querySelectorAll('.admin-only').forEach(el => { el.style.display = isAdmin ? '' : 'none'; });
  }

  async function loadPickerData() {
    const { data: products } = await supabaseClient
      .from('products')
      .select(`name, items ( id, sku, variant_name, attribute1_value )`);

    allItemsFlatForAdjust = [];
    (products || []).forEach(p => {
      (p.items || []).forEach(item => {
        const variant = item.attribute1_value || item.variant_name;
        const label = variant && variant !== p.name
          ? `${p.name} — ${variant} (${item.sku || 'no SKU'})`
          : `${p.name} (${item.sku || 'no SKU'})`;
        allItemsFlatForAdjust.push({ id: item.id, label });
      });
    });
    document.getElementById('adjust-item-options').innerHTML =
      allItemsFlatForAdjust.map(i => `<option value="${i.label}">`).join('');

    const { data: locs } = await supabaseClient.from('locations').select('id, name').order('name');
    allLocationsForAdjust = locs || [];
    document.getElementById('adjust-location').innerHTML =
      '<option value="">Choose a location...</option>' + allLocationsForAdjust.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
  }

  window.openAdjustModal = function() {
    document.getElementById('adjust-form').reset();
    document.getElementById('adjust-form-error').textContent = '';
    document.getElementById('adjust-modal-overlay').style.display = 'flex';
  };
  window.closeAdjustModal = function() {
    document.getElementById('adjust-modal-overlay').style.display = 'none';
  };

  document.getElementById('adjust-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('adjust-form-error');
    errorEl.textContent = '';

    const label = document.getElementById('adjust-item-search').value.trim();
    const match = allItemsFlatForAdjust.find(i => i.label === label);
    if (!match) {
      errorEl.textContent = 'Please pick an item from the list.';
      return;
    }
    const locationId = document.getElementById('adjust-location').value;
    const newStock = Number(document.getElementById('adjust-new-stock').value);
    const reason = document.getElementById('adjust-reason').value.trim();

    try {
      // Get the item's current stock so we can log the "before" value
      const { data: currentItem, error: fetchErr } = await supabaseClient
        .from('items').select('stock_on_hand').eq('id', match.id).single();
      if (fetchErr) throw fetchErr;

      const { error: updateErr } = await supabaseClient
        .from('items').update({ stock_on_hand: newStock }).eq('id', match.id);
      if (updateErr) throw updateErr;

      const { data: { user } } = await supabaseClient.auth.getUser();
      const { error: logErr } = await supabaseClient.from('stock_adjustments').insert({
        item_id: match.id,
        location_id: locationId,
        previous_stock: currentItem.stock_on_hand,
        new_stock: newStock,
        reason,
        changed_by: user?.id || null
      });
      if (logErr) throw logErr;

      closeAdjustModal();
      loadAdjustments();
    } catch (err) {
      errorEl.textContent = err.message || 'Something went wrong saving this.';
    }
  });

  initAuthGate(async function() {
    await loadPickerData();
    await loadAdjustments();
  });
</script>

</body>
</html>
